<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indore Smart Agriculture Dashboard</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #121212; 
            color: white; 
            padding: 20px; 
            margin: 0;
        }
        h2 { text-align: center; color: #ffffff; }
        
        /* Alert Banner Hidden by Default */
        #alert-banner {
            display: none; 
            background: #ff3b3b; 
            color: white; 
            padding: 15px; 
            text-align: center; 
            border-radius: 8px; 
            margin-bottom: 20px;
            font-weight: bold; 
            font-size: 18px;
            box-shadow: 0 4px 6px rgba(255, 59, 59, 0.2);
        }

        .card-container { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .card { 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 8px; 
            flex: 1; 
            min-width: 150px;
            text-align: center; 
            transition: all 0.3s ease; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card h3 { margin: 0; color: #aaaaaa; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;}
        .card p { margin: 10px 0 0 0; font-size: 28px; font-weight: bold; color: #4CAF50; }
        
        /* The Red Alert CSS Class */
        .alert-danger { 
            background-color: #ff3b3b !important; 
            animation: pulse 1.5s infinite; 
        }
        .alert-danger h3, .alert-danger p { color: white !important; }
        
        .chart-container { 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <h2>🌱 Indore Node 01 - Live Dashboard</h2>

    <div id="alert-banner">
        ⚠️ ALERT: Soil Moisture is below 50%! Watering Required.
    </div>

    <div class="card-container">
        <div class="card" id="moisture-card">
            <h3>Soil Moisture</h3>
            <p id="moisture-val">-- %</p>
        </div>
        <div class="card">
            <h3>Temperature</h3>
            <p id="temp-val">-- °C</p>
        </div>
        <div class="card">
            <h3>Humidity</h3>
            <p id="hum-val">-- %</p>
        </div>
        <div class="card">
            <h3>Condition</h3>
            <p id="cond-val" style="color:#2196F3;">--</p>
        </div>
<div class="card" style="border: 2px solid #9c27b0; box-shadow: 0 0 15px rgba(156, 39, 176, 0.3);">
            <h3>AI Forecast (1 Hr)</h3>
            <p id="ai-val" style="color: #e040fb;">-- %</p>
            <h3 id="ai-action" style="margin-top: 5px; font-size: 12px; color: #aaaaaa;">--</h3>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>

    <script>
        // 1. Firebase Configuration (With your specific details)
        const firebaseConfig = {
            apiKey: ", 
            authDomain: "m",
            databaseURL: "", 
            projectId: "",
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 2. Setup the Chart.js Graph
        const ctx = document.getElementById('myChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [], 
                datasets: [{
                    label: 'Soil Moisture (%)',
                    borderColor: '#4CAF50',
                    backgroundColor: 'rgba(76, 175, 80, 0.1)',
                    borderWidth: 3,
                    pointRadius: 4,
                    pointBackgroundColor: '#fff',
                    fill: true,
                    data: [] 
                }]
            },
            options: { 
                responsive: true, 
                plugins: {
                    legend: { labels: { color: 'white' } }
                },
                scales: { 
                    y: { 
                        beginAtZero: true, 
                        max: 100,
                        grid: { color: '#333' },
                        ticks: { color: '#aaa' }
                    },
                    x: {
                        grid: { color: '#333' },
                        ticks: { color: '#aaa' }
                    }
                } 
            }
        });

        // 3. Listen to Firebase in Real-Time (Last 15 entries)
        const logsRef = database.ref('sensor_logs').limitToLast(15);

        logsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return;

            // Clear old data arrays
            myChart.data.labels = [];
            myChart.data.datasets[0].data = [];

            let latestEntry = null;

            // Loop through Firebase data
            for (let key in data) {
                let entry = data[key];
                latestEntry = entry; 

                // Extract just the HH:MM part of the timestamp for the chart
                let timeParts = entry.timestamp_ist.split(" ");
                let timeString = timeParts.length > 1 ? timeParts[1].substring(0, 5) : entry.timestamp_ist;
                
                myChart.data.labels.push(timeString);
                myChart.data.datasets[0].data.push(entry.soil_data.moisture_percentage);
            }

            myChart.update();

            // 4. Update Cards and Check Alerts
            if (latestEntry) {
                let currentMoisture = latestEntry.soil_data.moisture_percentage;
                
                // Update text values
                document.getElementById('moisture-val').innerText = currentMoisture + " %";
                document.getElementById('temp-val').innerText = latestEntry.weather_data.temperature_celsius + " °C";
                document.getElementById('hum-val').innerText = latestEntry.weather_data.humidity_percentage + " %";
                document.getElementById('cond-val').innerText = latestEntry.weather_data.condition;

                // Handle the Alert Logic
                const moistureCard = document.getElementById('moisture-card');
                const alertBanner = document.getElementById('alert-banner');

                if (currentMoisture < 50) {
                    moistureCard.classList.add('alert-danger');
                    alertBanner.style.display = 'block';
                } else {
                    moistureCard.classList.remove('alert-danger');
                    alertBanner.style.display = 'none';
                }
            }
        });

// --- 5. Listen for AI Predictions ---
        const predictionRef = database.ref('latest_prediction');
        predictionRef.on('value', (snapshot) => {
            const aiData = snapshot.val();
            if (aiData) {
                document.getElementById('ai-val').innerText = aiData.predicted_moisture + " %";
                document.getElementById('ai-action').innerText = aiData.action_required;
            }
        });    
</script>
</body>
</html>
